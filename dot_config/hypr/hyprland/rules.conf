# ######## Window rules ########

# Disable blur for xwayland context menus
windowrule {
    name = disable_blur_xwayland
    match:class = ^()$
    match:title = ^()$
    no_blur = true
}

# Disable blur for every window
windowrule {
    name = disable_blur_all
    match:class = .*
    no_blur = true
}

# Floating Rules
windowrule {
    name = float_open_file
    match:title = ^(Open File)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_select_file
    match:title = ^(Select a File)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_choose_wallpaper
    match:title = ^(Choose wallpaper)(.*)$
    center = true
    float = true
    size = 60% 65%
}

windowrule {
    name = float_open_folder
    match:title = ^(Open Folder)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_save_as
    match:title = ^(Save As)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_library
    match:title = ^(Library)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_file_upload
    match:title = ^(File Upload)(.*)$
    center = true
    float = true
}

windowrule {
    name = float_wants_to_save
    match:title = ^(.*)(wants to save)$
    center = true
    float = true
}

windowrule {
    name = float_wants_to_open
    match:title = ^(.*)(wants to open)$
    center = true
    float = true
}

windowrule {
    name = float_blueberry
    match:class = ^(blueberry\.py)$
    float = true
}

windowrule {
    name = float_guifetch
    match:class = ^(guifetch)$
    float = true
}

windowrule {
    name = float_pavucontrol
    match:class = ^(pavucontrol)$
    center = true
    float = true
    size = 45%
}

windowrule {
    name = float_pavucontrol_org
    match:class = ^(org.pulseaudio.pavucontrol)$
    center = true
    float = true
    size = 45%
}

windowrule {
    name = float_nm_connection
    match:class = ^(nm-connection-editor)$
    center = true
    float = true
    size = 45%
}

windowrule {
    name = float_plasmawindowed
    match:class = .*plasmawindowed.*
    float = true
}

windowrule {
    name = float_kcm
    match:class = kcm_.*
    float = true
}

windowrule {
    name = float_bluedevil
    match:class = .*bluedevilwizard
    float = true
}

windowrule {
    name = float_welcome
    match:title = .*Welcome
    float = true
}

windowrule {
    name = float_illogical_impulse
    match:title = ^(illogical-impulse Settings)$
    float = true
}

windowrule {
    name = float_shell_conflicts
    match:title = .*Shell conflicts.*
    float = true
}

windowrule {
    name = float_kde_portal
    match:class = org.freedesktop.impl.portal.desktop.kde
    float = true
    size = 60% 65%
}

windowrule {
    name = float_zotero
    match:class = ^(Zotero)$
    float = true
    size = 45%
}

# stupid dolphin copy
windowrule {
    name = move_dolphin_copy
    match:title = ^(Copying — Dolphin)$
    move = 40 80
}

# Tiling
windowrule {
    name = tile_warp
    match:class = ^dev\.warp\.Warp$
    tile = true
}

# Picture-in-Picture
windowrule {
    name = pip_rules
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    keep_aspect_ratio = true
    move = 73% 72%
    size = 25%
    pin = true
}

# --- Tearing ---
windowrule {
    name = tear_exe
    match:title = .*\.exe
    immediate = true
}

windowrule {
    name = tear_minecraft
    match:title = .*minecraft.*
    immediate = true
}

windowrule {
    name = tear_steam
    match:class = ^(steam_app).*
    immediate = true
}

# Fix Jetbrain IDEs focus/rerendering problem
windowrule {
    name = fix_jetbrains_focus
    match:class = ^jetbrains-.*$
    match:float = true
    match:title = ^$|^\s$|^win\d+$
    no_initial_focus = true
}

# No shadow for tiled windows (matches windows that are not floating).
windowrule {
    name = no_shadow_tiled
    match:float = false
    no_shadow = true
}

# ######## Workspace rules ########
workspace = special:special, gapsout:50

# ######## Layer rules ########
layerrule {
    name = xray_all
    match:namespace = .*
    xray = 1
}

layerrule {
    name = no_anim_layers
    match:namespace = ^(walker|selection|overview|anyrun|indicator.*|osk|hyprpicker|noanim|gtk4-layer-shell)$
    no_anim = true
}

layerrule {
    name = layer_gtk_shell
    match:namespace = ^(gtk-layer-shell)$
    blur = true
    ignore_alpha = 0.0
}

layerrule {
    name = layer_launcher
    match:namespace = ^(launcher)$
    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = layer_notifications
    match:namespace = ^(notifications)$
    blur = true
    ignore_alpha = 0.69
}

layerrule {
    name = layer_wlogout
    match:namespace = ^(logout_dialog)$
    blur = true
}

#### 

# New theme

# Window rules for QuickShell windows
windowrule {
    name = quickshell_float
    match:class = ^(quickshell)$
    float = true
}

windowrule {
    name = quickshell_no_blur
    match:class = ^(quickshell)$
    match:title = ^(quickshell)$
    no_blur = true
}
